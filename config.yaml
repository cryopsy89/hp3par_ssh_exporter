server:
  host: "0.0.0.0"
  port: 6767
  timeout: 300
  workers: 10
  reuse_addr: true

cache:
  update_interval: 25
  enabled: true

monitoring:
  default_life_threshold: 80
  script_timeout: 60
  storage_user: "your_login_here"
  storage_password: "your_passwd_here"
  zabbix_host_prefix: "storage"

logging:
  level: "INFO"
  format: "[%(asctime)s] [Thread-%(thread)d] %(client_ip)s - %(message)s"

security:
  allowed_hosts: []  # пустой список = все хосты разрешены
  max_request_size: 1048576  # 1MB